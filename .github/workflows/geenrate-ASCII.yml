name: Generate ASCII artwork

on:
  push

jobs:
  ascii_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: List repo files
        run: ls -ltra

      - name: mode +x
        run: chmod +x ./ascii-script.sh

      - name: run the script
        run: ./ascii-script.sh
