name: Generate ASCII artwork

on:
  push

jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
      - name: install cowsay
        run : sudo apt-get install cowsay -y
        
      - name: execute cowsay
        run: /usr/games/cowsay -f dragon "fire fire fire" >> dragon.txt

      - name: upload dragon text file
        uses: actions/upload-artifact@v4
        with:
          name: dragon-text-file
          path: dragon.txt
  
  test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
      - name: download dragon text file
        uses: actions/download-artifact@v4
        with:
          name: dragon-text-file
     
      - name: test file exitst
        run: grep -i "fire" dragon.txt

  deploy_job_3: 
    needs: test_job_2
    runs-on: ubuntu-latest
    steps:
      - name: download dragon text file
        uses: actions/download-artifact@v4
        with:
          name: dragon-text-file
  
      - name: read file
        run: cat dragon.txt



