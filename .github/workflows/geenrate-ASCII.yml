name: Generate ASCII artwork

on:
  push

jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
      - name: install cowsay
        run : sudo apt-get install cowsay -y
        
      - name: execute cowsay
        run: /usr/games/cowsay -f dragon "fire fire fire" >> dragon.txt

      - name: sleep for 30
        run: sleep 30
  
  test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
       - name: sleep 10
         run: sleep 10
     
       - name: test file exitst
         run: grep -i "fire" dragon.txt

  deploy_job_3: 
    needs: test_job_2
    runs-on: ubuntu-latest
    steps:
       - name: read file
         run: cat dragon.txt



